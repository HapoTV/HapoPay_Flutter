name: hapopay
description: HapoPay - Smart Student Spending Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Navigation
  go_router: ^17.3.0

  # Networking
  dio: ^5.7.0

  # Supabase
  supabase_flutter: ^2.6.0

  # Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.3.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.2.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.4.0

  # Biometrics
  local_auth: ^3.0.2

  # Utils
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
