name: hapopay
description: HapoPay - Smart Student Spending Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Supabase
  supabase_flutter: ^2.6.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Biometrics
  local_auth: ^2.3.0

  # Utils
  intl: ^0.19.0
  flutter_qr_code_scaner: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
